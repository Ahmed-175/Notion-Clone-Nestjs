version: '3.8'
services:
  mongodb: 
    image: mongo:latest
    container_name: mongodb_container
    ports:
      - "27017:27017"
    restart : always
    volumes:
      - mongo_data:/data/db
  redis:
    image: redis:7
    container_name: redis_container

    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
volumes:
  mongo_data:
  redis_data:

    
      